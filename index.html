<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>影子贪吃蛇</title>
  <link rel="stylesheet" href="style.css?v=mobile-gesture-hud1">
</head>
<body>
  <main class="mobile-game">
    <header class="mobile-hud">
      <div class="mobile-hud-left">
        <button id="mobilePauseButton" class="mobile-icon-button" type="button" aria-label="暂停">Ⅱ</button>
        <div id="mobileRewindCard" class="mobile-rewind-card">
          <span class="mobile-hud-label">回溯</span>
          <strong id="rewindText">0/0</strong>
        </div>
      </div>

      <div id="mobileGoalBanner" class="mobile-goal-banner" aria-live="polite">
        准备挑战排行榜
      </div>

      <div class="mobile-hud-right">
        <div class="mobile-player-card">
          <span id="playerAvatar" class="mobile-player-avatar">🐍</span>
          <span id="playerProfileName" class="mobile-player-name">玩家</span>
        </div>
        <div class="mobile-score-card">
          <span class="mobile-hud-label">分数</span>
          <strong id="scoreText">0</strong>
        </div>
      </div>
    </header>

    <section class="mobile-board">
      <canvas id="gameCanvas" aria-label="影子贪吃蛇游戏画布"></canvas>
      <div id="achievementToast" class="achievement-toast" aria-live="polite"></div>
      <div id="countdownToast" class="countdown-toast" aria-live="polite"></div>
      <div id="mobileGestureHint" class="mobile-gesture-hint">滑一下转向，画 L 连续拐弯</div>
      <div id="mobileGestureLayer" class="mobile-gesture-layer" aria-label="手势操作区"></div>
    </section>

    <section id="overlay" class="mobile-overlay is-start-screen">
      <div class="mobile-modal">
        <p id="overlayKicker" class="overlay-kicker">准备开始</p>
        <h1 id="overlayTitle">影子贪吃蛇</h1>
        <p id="overlayText">吃红宝石，避开过去留下的影子。</p>

        <label class="player-name-field" for="playerNameInput">
          <span>玩家昵称</span>
          <input id="playerNameInput" type="text" maxlength="12" autocomplete="nickname" placeholder="输入昵称">
        </label>
        <p id="playerNameHint" class="player-name-hint" aria-live="polite"></p>

        <button id="overlayStartButton" class="primary-button" type="button">开始游戏</button>
        <button id="mobileOverlayLeaderboardButton" class="secondary-button" type="button">查看排行榜</button>
        <button id="mobileTutorialButton" class="secondary-button" type="button">新手教程</button>
      </div>
    </section>

    <section id="mobileTutorialModal" class="mobile-overlay is-hidden">
      <div class="mobile-modal tutorial-modal">
        <p id="tutorialKicker" class="overlay-kicker">新手教程</p>
        <h2 id="tutorialTitle">吃红宝石</h2>
        <p id="tutorialText"></p>
        <div class="tutorial-actions">
          <button id="tutorialSkipButton" class="secondary-button" type="button">跳过</button>
          <button id="tutorialNextButton" class="primary-button" type="button">下一步</button>
        </div>
      </div>
    </section>

    <section id="mobileLeaderboardModal" class="mobile-overlay is-hidden">
      <div class="mobile-modal leaderboard-modal">
        <h2>排行榜 Top 10</h2>
        <ol id="leaderboardList" class="leaderboard-list"></ol>
        <button id="mobileLeaderboardCloseButton" class="primary-button" type="button">关闭</button>
      </div>
    </section>

    <section id="mobilePauseModal" class="mobile-overlay is-hidden">
      <div class="mobile-modal pause-modal">
        <h2>游戏暂停</h2>
        <button id="mobileResumeButton" class="primary-button" type="button">继续</button>
        <button id="restartButton" class="secondary-button" type="button">重新开始</button>
        <button id="soundButton" class="secondary-button" type="button">声音：开</button>
        <button id="mobileShowLeaderboardButton" class="secondary-button" type="button">查看排行榜</button>
        <button id="mobileShowTutorialButton" class="secondary-button" type="button">教程</button>
      </div>
    </section>

    <div id="rotateHint" class="rotate-hint">请竖屏体验</div>

    <p id="statusText" class="mobile-status">等待开始</p>

    <span id="bestScoreText" hidden>0</span>
    <span id="speedText" hidden>1</span>
    <span id="skinText" hidden>默认</span>
    <span id="effectText" hidden>无</span>
    <span id="comboText" hidden>Combo x0</span>
    <button id="startButton" class="compat-hidden" type="button">开始游戏</button>
    <input id="bgmVolumeSlider" class="compat-hidden" type="range" min="0" max="100" value="29" aria-hidden="true">
    <input id="sfxVolumeSlider" class="compat-hidden" type="range" min="0" max="100" value="77" aria-hidden="true">
    <span id="bgmVolumeMascot" hidden></span>
    <span id="sfxVolumeMascot" hidden></span>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js?v=mobile-gesture-hud1"></script>
</body>
</html>
